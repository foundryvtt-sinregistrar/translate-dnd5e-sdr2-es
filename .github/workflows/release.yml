name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release (Draft)
    runs-on: ubuntu-latest

    steps:
      # Checkout del commit apuntado por el tag (se asume que el tag se crea desde develop,
      # donde existe dev-tools/buildScripts/build_release.py)
      - name: Checkout tagged commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build module zip (git archive)
        run: |
          python dev-tools/buildScripts/build_release.py --dist dist --ref "${GITHUB_SHA}"
          ls -lah dist

      - name: Verify expected asset exists
        run: |
          test -f "dist/translate-dnd5e-sdr2-es.zip"
          echo "OK: dist/translate-dnd5e-sdr2-es.zip exists"

      - name: Create GitHub Release (DRAFT) and upload asset
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/translate-dnd5e-sdr2-es.zip